<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | KRM-Site</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 bg-dark vh-100 p-3">
        <h4 class="text-white mb-4">
          <i class="fas fa-cog me-2"></i>Admin
        </h4>
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link text-white active" href="dashboard.html">
              <i class="fas fa-chart-line me-2"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="products.html">
              <i class="fas fa-box me-2"></i>Products
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="orders.html">
              <i class="fas fa-shopping-bag me-2"></i>Orders
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="users.html">
              <i class="fas fa-users me-2"></i>Users
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="inventory.html">
              <i class="fas fa-warehouse me-2"></i>Inventory
            </a>
          </li>
          <hr class="border-secondary">
          <li class="nav-item">
            <a class="nav-link text-danger" href="../index.html">
              <i class="fas fa-sign-out-alt me-2"></i>Back to Site
            </a>
          </li>
        </ul>
      </nav>

      <!-- Main Content -->
      <main class="col-md-10 p-4">
        <h2 class="fw-bold mb-4">
          <i class="fas fa-chart-line me-2"></i>Dashboard
        </h2>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4">
          <div class="col-md-3">
            <div class="card text-white bg-primary">
              <div class="card-body">
                <h6 class="card-title">Total Revenue</h6>
                <h2 id="totalRevenue">Rs. 0</h2>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-white bg-success">
              <div class="card-body">
                <h6 class="card-title">Total Orders</h6>
                <h2 id="totalOrders">0</h2>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-white bg-warning">
              <div class="card-body">
                <h6 class="card-title">Total Products</h6>
                <h2 id="totalProducts">0</h2>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-white bg-danger">
              <div class="card-body">
                <h6 class="card-title">Total Users</h6>
                <h2 id="totalUsers">0</h2>
              </div>
            </div>
          </div>
        </div>

        <!-- Charts -->
        <div class="row g-4">
          <div class="col-md-8">
            <div class="card shadow-sm">
              <div class="card-header bg-white">
                <h5 class="mb-0">Monthly Sales</h5>
              </div>
              <div class="card-body">
                <canvas id="salesChart" height="250"></canvas>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card shadow-sm">
              <div class="card-header bg-white">
                <h5 class="mb-0">Order Status</h5>
              </div>
              <div class="card-body">
                <canvas id="statusChart" height="250"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- Recent Orders -->
        <div class="card shadow-sm mt-4">
          <div class="card-header bg-white">
            <h5 class="mb-0">Recent Orders</h5>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead>
                  <tr>
                    <th>Order ID</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Date</th>
                  </tr>
                </thead>
                <tbody id="recentOrders">
                  <tr>
                    <td colspan="5" class="text-center py-3">
                      <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>

</html>
