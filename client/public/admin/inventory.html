<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management | KRM-Site</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 bg-dark vh-100 p-3">
        <h4 class="text-white mb-4"><i class="fas fa-cog me-2"></i>Admin</h4>
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link text-white" href="dashboard.html"><i
                class="fas fa-chart-line me-2"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="products.html"><i
                class="fas fa-box me-2"></i>Products</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="orders.html"><i
                class="fas fa-shopping-bag me-2"></i>Orders</a></li>
          <li class="nav-item"><a class="nav-link text-white active" href="inventory.html"><i
                class="fas fa-warehouse me-2"></i>Inventory</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="users.html"><i
                class="fas fa-users me-2"></i>Users</a></li>
          <hr class="border-secondary">
          <li class="nav-item"><a class="nav-link text-danger" href="../index.html"><i
                class="fas fa-sign-out-alt me-2"></i>Back to Site</a></li>
        </ul>
      </nav>

      <!-- Main Content -->
      <main class="col-md-10 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="fw-bold"><i class="fas fa-warehouse me-2"></i>Inventory Management</h2>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-4">
          <div class="col-md-3">
            <div class="card text-white bg-primary">
              <div class="card-body">
                <h6 class="card-title">Total Products</h6>
                <h2 id="totalProducts">0</h2>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-white bg-success">
              <div class="card-body">
                <h6 class="card-title">In Stock</h6>
                <h2 id="inStock">0</h2>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-white bg-warning">
              <div class="card-body">
                <h6 class="card-title">Low Stock (&lt; 10)</h6>
                <h2 id="lowStock">0</h2>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card text-white bg-danger">
              <div class="card-body">
                <h6 class="card-title">Out of Stock</h6>
                <h2 id="outOfStock">0</h2>
              </div>
            </div>
          </div>
        </div>

        <!-- Filters -->
        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <input type="text" class="form-control" id="searchInventory" placeholder="Search products...">
          </div>
          <div class="col-md-3">
            <select class="form-select" id="stockFilter">
              <option value="">All Stock</option>
              <option value="instock">In Stock</option>
              <option value="lowstock">Low Stock</option>
              <option value="outofstock">Out of Stock</option>
            </select>
          </div>
          <div class="col-md-2">
            <button class="btn btn-outline-danger w-100" onclick="clearInventoryFilters()">
              <i class="fas fa-times me-1"></i>Clear
            </button>
          </div>
        </div>

        <!-- Products Table -->
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead class="table-light">
                  <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="inventoryTableBody">
                  <tr>
                    <td colspan="5" class="text-center py-4">
                      <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <!-- Pagination -->
            <div id="inventoryPagination" class="d-flex justify-content-center mt-3"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Update Stock Modal -->
  <div class="modal fade" id="updateStockModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Update Stock</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="updateStockForm">
            <input type="hidden" id="stockProductId">
            <div class="mb-3">
              <label class="form-label">Product</label>
              <p class="fw-bold" id="stockProductName">-</p>
            </div>
            <div class="mb-3">
              <label class="form-label">Current Stock</label>
              <p id="stockCurrentStock">-</p>
            </div>
            <div class="mb-3">
              <label class="form-label">New Stock Quantity</label>
              <input type="number" class="form-control" id="stockNewQuantity" min="0" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="fas fa-save me-2"></i>Update Stock
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>

</html>
