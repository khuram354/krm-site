<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Products | KRM-Site</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 bg-dark vh-100 p-3">
        <h4 class="text-white mb-4">
          <i class="fas fa-cog me-2"></i>Admin
        </h4>
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link text-white" href="dashboard.html">
              <i class="fas fa-chart-line me-2"></i>Dashboard
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white active" href="products.html">
              <i class="fas fa-box me-2"></i>Products
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="orders.html">
              <i class="fas fa-shopping-bag me-2"></i>Orders
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white" href="users.html">
              <i class="fas fa-users me-2"></i>Users
            </a>
          </li>
          <hr class="border-secondary">
          <li class="nav-item">
            <a class="nav-link text-danger" href="../index.html">
              <i class="fas fa-sign-out-alt me-2"></i>Back to Site
            </a>
          </li>
        </ul>
      </nav>

      <!-- Main Content -->
      <main class="col-md-10 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="fw-bold">
            <i class="fas fa-box me-2"></i>Products
          </h2>
          <button class="btn btn-primary" onclick="showAddProduct()">
            <i class="fas fa-plus me-2"></i>Add Product
          </button>
        </div>

        <!-- Products Table -->
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead class="table-light">
                  <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Category</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="productsTableBody">
                  <tr>
                    <td colspan="6" class="text-center py-4">
                      <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>

</html>
