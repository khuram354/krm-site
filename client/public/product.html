<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | KRM-Site</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">KRM-Site</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> <span
                class="badge bg-danger" id="cartCount">0</span></a></li>
          <li class="nav-item" id="authLinks">
            <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#loginModal"><i class="fas fa-user"></i>
              Login</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div id="productDetail"></div>
    <!-- (Hidden container for pagination) -->
    <div id="productContainer" style="display: none;"></div>
    <!-- Reviews Section -->
    <div id="reviewsSection" class="mt-5">
      <h4 class="fw-bold mb-4">
        <i class="fas fa-star me-2"></i>Reviews
        <span class="text-muted fs-6" id="reviewCount">(0)</span>
      </h4>

      <!-- Write Review Form (only for logged in users) -->
      <div id="reviewFormContainer" class="card shadow-sm mb-4 d-none">
        <div class="card-body">
          <h5 class="card-title">Write a Review</h5>
          <form id="reviewForm">
            <div class="mb-3">
              <label class="form-label">Rating</label>
              <div class="rating-stars">
                <i class="far fa-star fa-2x" data-rating="1" onclick="setRating(1)"></i>
                <i class="far fa-star fa-2x" data-rating="2" onclick="setRating(2)"></i>
                <i class="far fa-star fa-2x" data-rating="3" onclick="setRating(3)"></i>
                <i class="far fa-star fa-2x" data-rating="4" onclick="setRating(4)"></i>
                <i class="far fa-star fa-2x" data-rating="5" onclick="setRating(5)"></i>
              </div>
              <input type="hidden" id="reviewRating" value="0">
            </div>
            <div class="mb-3">
              <label class="form-label">Comment</label>
              <textarea class="form-control" id="reviewComment" rows="3"
                placeholder="Share your experience with this product..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-paper-plane me-2"></i>Submit Review
            </button>
          </form>
        </div>
      </div>

      <!-- Reviews List -->
      <div id="reviewsList">
        <div class="text-center py-4">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== MODALS ========== -->
  <!-- Login Modal -->
  <div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-sign-in-alt me-2"></i>Login</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label" for="loginEmail">Email</label>
              <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="loginPassword">Password</label>
              <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
          <p class="text-center mt-3">
            Don't have an account? <a href="#" data-bs-toggle="modal" data-bs-target="#registerModal">Register</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- Register Modal -->
  <div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>Register</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label" for="registerName">Name</label>
              <input type="text" class="form-control" id="registerName" placeholder="Enter your name" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="registerEmail">Email</label>
              <input type="email" class="form-control" id="registerEmail" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
              <label class="form-label" for="registerPassword">Password</label>
              <input type="password" class="form-control" id="registerPassword"
                placeholder="Enter your password (6+ characters)" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Register</button>
          </form>
          <p class="text-center mt-3">
            Already have an account? <a href="#" data-bs-toggle="modal" data-bs-target="#loginModal">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/product.js"></script>
</body>

</html>
